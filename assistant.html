{% extends "base.html" %}

{% block title %}AI Assistant - Mentora{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="mb-4"><i class="fas fa-robot"></i> AI Academic Assistant</h1>
            <p class="lead">Get instant help with your academic questions</p>
            
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <form id="questionForm">
                        <div class="mb-3">
                            <label for="question" class="form-label">Ask a Question</label>
                            <textarea class="form-control" id="question" rows="4" 
                                      placeholder="Ask anything about your studies..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-search"></i> Get Answer
                        </button>
                    </form>
                </div>
            </div>

            <div id="answerContainer" class="mt-4" style="display:none;">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-lightbulb"></i> Answer</h5>
                    </div>
                    <div class="card-body">
                        <p id="answerText"></p>
                    </div>
                </div>
            </div>

            <div id="loadingContainer" class="mt-4 text-center" style="display:none;">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Thinking...</p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('questionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const question = document.getElementById('question').value;
    
    if (!question.trim()) return;
    
    document.getElementById('answerContainer').style.display = 'none';
    document.getElementById('loadingContainer').style.display = 'block';
    
    fetch('{{ url_for("ai_assistant.ask_question") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            question: question
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loadingContainer').style.display = 'none';
        if (data.success) {
            document.getElementById('answerText').textContent = data.answer;
            document.getElementById('answerContainer').style.display = 'block';
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    })
    .catch(error => {
        document.getElementById('loadingContainer').style.display = 'none';
        alert('Error: ' + error.message);
    });
});
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Chat with {{ other_user.name }} - Mentora{% endblock %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="row h-100">
        <div class="col-md-3">
            <h4 class="mb-3"><i class="fas fa-inbox"></i> Conversations</h4>
            <div class="list-group">
                <a href="#" class="list-group-item list-group-item-action active">
                    <img src="{{ other_user.profile_picture or 'https://via.placeholder.com/40' }}" 
                         alt="{{ other_user.name }}" class="rounded-circle me-2" width="40" height="40">
                    {{ other_user.name }}
                </a>
            </div>
        </div>
        
        <div class="col-md-9">
            <div class="card h-100 d-flex flex-column">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">{{ other_user.name }}</h5>
                </div>
                
                <div class="card-body overflow-auto" id="messagesContainer" style="height: 400px;">
                    {% for msg in messages %}
                    <div class="mb-3 {% if msg.sender_id == current_user.id %}text-end{% endif %}">
                        <div class="d-inline-block {% if msg.sender_id == current_user.id %}bg-primary text-white{% else %}bg-light{% endif %} rounded px-3 py-2" style="max-width: 70%;">
                            {{ msg.content }}
                        </div>
                        <small class="d-block text-muted mt-1">{{ msg.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
                    </div>
                    {% endfor %}
                </div>
                
                <div class="card-footer">
                    <form id="messageForm" class="d-flex">
                        <input type="text" class="form-control me-2" id="messageInput" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('messageForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const content = document.getElementById('messageInput').value;
    
    if (!content.trim()) return;
    
    fetch('{{ url_for("messaging.send_message") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            receiver_id: '{{ other_user._id }}',
            content: content
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById('messageInput').value = '';
            location.reload();
        }
    });
});

// Auto-scroll to bottom
document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
</script>
{% endblock %}

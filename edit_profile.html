{% extends "base.html" %}

{% block title %}Edit Profile - Mentora{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title mb-4">Edit Your Profile</h2>
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   value="{{ user.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="profile_picture" class="form-label">Profile Picture</label>
                            <input type="file" class="form-control" id="profile_picture" 
                                   name="profile_picture" accept="image/*">
                            <small class="form-text text-muted">PNG, JPG, JPEG, or GIF (max 5MB)</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="4">{{ user.bio }}</textarea>
                        </div>
                        
                        {% if user.role == 'faculty' %}
                        <div class="mb-3">
                            <label for="expertise" class="form-label">Expertise (comma-separated)</label>
                            <textarea class="form-control" id="expertise" name="expertise" rows="2">{{ user.expertise|join(', ') }}</textarea>
                        </div>
                        {% endif %}
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                            <a href="{{ url_for('profile.view_profile') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
